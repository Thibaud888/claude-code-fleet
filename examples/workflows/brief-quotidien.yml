# Brief quotidien de la flotte — version CLOUD (GitHub Actions), always-on (tourne même PC éteint).
# Remplace la routine LOCALE `scheduled-tasks` du même nom, qui ne tournait que l'app ouverte.
#
# Pattern : CLI Claude Code headless (comme map.yml), PAS anthropics/claude-code-action
# (l'action refuse les events `schedule`). Le CLI est indifférent à l'event déclencheur.
# usage_local (ccusage) n'existe pas en cloud → BRIEF_CLOUD=1 fait sauter ce bloc dans brief-data.mjs.
#
# ⚠️ Cron GitHub = UTC uniquement. "45 6 * * *" = 8h45 CEST (été) / 7h45 CET (hiver) : dérive DST ±1 h assumée.
name: Brief flotte quotidien

on:
  schedule:
    - cron: "45 6 * * *"
  workflow_dispatch: {}

concurrency:
  group: brief-flotte
  cancel-in-progress: false

jobs:
  brief:
    runs-on: ubuntu-latest
    permissions:
      contents: read        # le brief ne commit rien ici : gist + ntfy uniquement
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Installer Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Brief quotidien de la flotte
        env:
          # Abonnement (OAuth) uniquement : pas d'ANTHROPIC_API_KEY → jamais de crédits API.
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GH_TOKEN: ${{ secrets.FLEET_GH_TOKEN }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          HEALTHCHECKS_API_KEY: ${{ secrets.HEALTHCHECKS_API_KEY }}
          BRIEF_CLOUD: "1"
        run: |
          cat > /tmp/prompt-brief.md << 'FIN_PROMPT'
          Tu es le chief of staff de ta flotte de repos (compte GitHub VOTRE-COMPTE). Produis le brief du matin, lisible en 20 secondes, en français et au tutoiement. LECTURE SEULE : aucun commit, aucune écriture dans les repos. Session courte et économe en tokens : uniquement les commandes listées ci-dessous, aucune exploration.

          Étapes :
          1. Lance `node scripts/brief-data.mjs` — il collecte TOUT en un appel (PRs ouvertes, échecs de runs des 24 h, issues `claude`, chiens de garde Healthchecks) et sort un JSON compact. Ne lance AUCUNE commande de collecte supplémentaire (pas de `gh` directs) : si le script échoue, signale-le dans le brief et passe à l'étape 4. En cloud, `usage_local` est null — n'écris PAS de ligne 💰.
          2. Rédige le brief à partir du JSON :
             - 🔴 à traiter : échecs de crons (cron=true en priorité), checks Healthchecks late/down, issues claude > 24 h avec pr_liee=false (session probablement plantée).
             - 🟡 à surveiller : PRs qui vieillissent (age_j élevé), échecs non-crons (surtout n > 1), issues claude en attente.
             - ✅ RAS si tout va bien.
             Liens cliquables.
          3. Le LUNDI uniquement (lundi=true dans le JSON) :
             - « Suggestion du jour » : lis 1 ou 2 BACKLOG.md de repos actifs via `gh api repos/VOTRE-COMPTE/<repo>/contents/BACKLOG.md --jq .content | base64 -d` et propose UN item qui vaudrait un dispatch. Les autres jours, pas de suggestion.
             - Si harvest_hebdo est late/down dans le JSON : rappelle la moisson hebdo (procédure harvest/README.md de claude-ops).
          4. SEULEMENT s'il y a du 🔴 ou du 🟡 :
             a. Écris le brief complet (rédigé aux étapes 2-3) dans un fichier nommé `brief-flotte-AAAA-MM-JJ.md` (le nom du fichier local devient le nom dans le gist), puis publie-le en gist secret : `gh gist create <fichier> --desc "Brief flotte AAAA-MM-JJ"`. Récupère l'URL du gist (dernière ligne de la sortie).
             b. Envoie une VERSION COURTE (≤ 500 caractères) via `node scripts/ntfy.mjs "Brief flotte" "<corps>" --click=<URL du gist> --markdown`. Corps : uniquement les compteurs 🔴/🟡 et le point le plus critique — le détail complet est dans le gist, un tap sur la notif l'ouvre.
             c. Purge les vieux gists de brief (> 30 jours) : `node scripts/gist-cleanup.mjs` (fail-open : ne casse rien s'il n'y a rien à purger).
             Si tout est ✅ : pas de notification, pas de gist (donc pas de purge non plus). Affiche le brief complet dans ta réponse de session.

          Contraintes : uniquement les commandes ci-dessus ; si une étape échoue, continue avec le reste et signale-le.
          FIN_PROMPT
          claude -p "$(cat /tmp/prompt-brief.md)" \
            --model claude-haiku-4-5-20251001 \
            --max-turns 25 \
            --allowedTools "Bash(node:*),Bash(gh:*),Read,Glob,Grep"
