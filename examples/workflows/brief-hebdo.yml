# Brief hebdo de la flotte — version CLOUD (GitHub Actions), always-on (tourne même PC éteint).
# Hebdomadaire depuis le 2026-07-19 (avant : quotidien) : les alertes au fil de l'eau sont
# désormais portées par le veilleur FleetView (cron 15 min, app fermée) — le brief n'est plus
# un système d'alerte mais le RENDEZ-VOUS du lundi matin : bilan de la semaine (traité vs
# restant), tokens/activité, suggestion de dispatch, rappels.
#
# Pattern : CLI Claude Code headless (comme map.yml), PAS anthropics/claude-code-action
# (l'action refuse les events `schedule`). Le CLI est indifférent à l'event déclencheur.
# usage_local (ccusage) n'existe pas en cloud → BRIEF_CLOUD=1 fait sauter ce bloc dans
# brief-data.mjs ; les tokens locaux viennent du dernier rapport versionné rapport/tokens/
# (écrit par la tâche locale `bilan-tokens-hebdo`, dimanche 21h).
#
# ⚠️ Cron GitHub = UTC uniquement. "45 6 * * 1" = lundi 8h45 CEST (été) / 7h45 CET (hiver).
name: Brief flotte hebdo

on:
  schedule:
    - cron: "45 6 * * 1"
  workflow_dispatch: {}

concurrency:
  group: brief-flotte
  cancel-in-progress: false

jobs:
  brief:
    runs-on: ubuntu-latest
    permissions:
      contents: read        # le brief ne commit rien ici : gist + ntfy uniquement
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Installer Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Brief hebdo de la flotte
        env:
          # Abonnement (OAuth) uniquement : pas d'ANTHROPIC_API_KEY → jamais de crédits API.
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GH_TOKEN: ${{ secrets.FLEET_GH_TOKEN }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          HEALTHCHECKS_API_KEY: ${{ secrets.HEALTHCHECKS_API_KEY }}
          BRIEF_CLOUD: "1"
        run: |
          cat > /tmp/prompt-brief.md << 'FIN_PROMPT'
          Tu es le chief of staff de la flotte de repos de toi (compte GitHub VOTRE-COMPTE). Produis le BRIEF HEBDO du lundi matin, lisible en 60 secondes, en français et au tutoiement. LECTURE SEULE : aucun commit, aucune écriture dans les repos. Session courte et économe en tokens : uniquement les commandes listées ci-dessous, aucune exploration.

          Étapes :
          1. Lance `node scripts/brief-data.mjs` — il collecte TOUT en un appel (état courant : PRs ouvertes, workflows en échec, issues `claude`, dispatchs en rade, validité du token d'abonnement, chiens de garde Healthchecks ; et semaine écoulée : PRs mergées, issues `claude` fermées avec labels, sessions cloud par repo/workflow, part méta) et sort un JSON compact. Ne lance AUCUNE commande de collecte supplémentaire hors de celles listées plus bas : si le script échoue, signale-le dans le brief et rédige avec ce que tu as.
          2. Rédige le brief à partir du JSON, dans cet ordre :
             - **✅ Traité cette semaine** : PRs mergées (`prs_mergees_7j`, groupées par repo), issues claude fermées, échecs réparés (`repares_24h`). Bref et factuel — c'est la preuve que la machine avance.
             - **🔴 Reste à traiter** : si `token_claude.statut` vaut `suspect`, c'est LE point du brief et il passe avant tout le reste (reprends son `message` et les runs de `suspects` : sans token valide, toute la flotte est à l'arrêt sans le savoir) ; `ok` ou `inconnu` ne se mentionnent pas. Puis crons en échec (`en_echec` avec cron=true), checks Healthchecks late/down, puis **dispatchs en rade** (`dispatch_en_rade`) — le suivi du lot dispatché : une ligne par entrée avec son `motif`, son âge et le lien. `type: "issue"` = la session n'a rien produit, relancer le dispatch ; `type: "pr"` = le travail est fait mais pas livré, il ne manque qu'un merge. C'est du travail perdu tant que personne ne regarde : ne jamais omettre cette liste si elle est non vide.
             - **🟡 À surveiller** : PRs qui vieillissent (age_j élevé) et échecs non-crons (surtout echecs_consecutifs > 1) — sans répéter ce qui est déjà en 🔴.
             - **💰 Tokens & activité** (section importante, ne jamais l'omettre) :
               * Local : lis le rapport le plus récent de `rapport/tokens/` (checkout du repo, fichier `AAAA-SNN.md` le plus récent — écrit dimanche soir par la tâche locale). Reprends-en le total 7 j, la répartition par modèle, le ratio cache et le fait marquant. S'il date de plus de 8 jours, dis-le (« PC éteint dimanche ? ») et reprends quand même le dernier connu.
               * Cloud : `sessions_cloud_7j` du JSON (sessions Actions par repo et par workflow) et les modèles des issues fermées (labels `claude:*`, défaut Sonnet). C'est un PROXY d'activité (les tokens cloud de l'abonnement ne sont pas mesurables) — le dire en une parenthèse.
               * Part méta : `pct_meta_7j` (PRs mergées sur claude-ops/fleet-kit/fleetview vs le reste). > 50 % sur une semaine calme → le signaler : la flotte travaille pour la flotte.
             - **Suggestion de la semaine** : lis 1 ou 2 BACKLOG.md de repos actifs via `gh api repos/VOTRE-COMPTE/<repo>/contents/BACKLOG.md --jq .content | base64 -d` et propose UN item qui vaudrait un dispatch (jamais un item « ⚠️ hors-Actions »).
             - Si le check harvest est late/down dans le JSON : rappelle la moisson mensuelle (procédure harvest/README.md de claude-ops).
             Liens cliquables partout.
          3. Publie et notifie (chaque lundi, même si tout est ✅ — c'est le rendez-vous hebdo).
             PAS de gist (FLEET_GH_TOKEN est un PAT fine-grained : les gists lui sont interdits — constaté au test du 2026-07-19) ; le brief est versionné dans le repo :
             a. Écris le brief complet dans un fichier local `/tmp/brief.md`, puis pousse-le en `rapport/briefs/brief-AAAA-MM-JJ.md` sur claude-ops via l'API contents : `gh api -X PUT repos/VOTRE-COMPTE/claude-ops/contents/rapport/briefs/brief-AAAA-MM-JJ.md -f message="brief : AAAA-MM-JJ" -f content="$(base64 -w0 /tmp/brief.md)"`. Si le PUT répond 422 (re-run du même jour, fichier déjà là) : récupère son `sha` (`gh api .../contents/... --jq .sha`) et rejoue le PUT avec `-f sha=<sha>`.
             b. Envoie une VERSION COURTE (≤ 500 caractères) via `node scripts/ntfy.mjs "Brief flotte" "<corps>" --click=https://github.com/VOTRE-COMPTE/claude-ops/blob/main/rapport/briefs/brief-AAAA-MM-JJ.md --markdown`. Corps : compteurs ✅/🔴/🟡, le point le plus critique (un `dispatch_en_rade` non vide passe devant tout le reste : « N item(s) en rade »), et le total tokens local — le détail complet est dans le fichier, un tap sur la notif l'ouvre.

          Contraintes : uniquement les commandes ci-dessus ; si une étape échoue, continue avec le reste et signale-le.
          FIN_PROMPT
          # --output-format json : la sortie finale porte `total_cost_usd`, que tokens-hebdo.mjs
          # relit dans le log du run (fin des forfaits estimés pour cet automatisme). La session
          # travaille exactement pareil — seule la forme de sa sortie stdout change, et le brief
          # lui-même part par gh/ntfy, pas par stdout.
          claude -p "$(cat /tmp/prompt-brief.md)" \
            --model claude-haiku-4-5-20251001 \
            --max-turns 40 \
            --output-format json \
            --allowedTools "Bash(node:*),Bash(gh:*),Bash(base64:*),Read,Glob,Grep"
